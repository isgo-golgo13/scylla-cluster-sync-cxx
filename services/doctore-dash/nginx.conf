# services/doctore-dash/nginx.conf
#
# Nginx configuration for Doctore Dashboard SPA
#

server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/wasm;
    gzip_min_length 1000;

    # WASM MIME type
    types {
        application/wasm wasm;
    }

    # Cache static assets
    location /pkg/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /style/ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # API proxy — routes to C++20 sstable-loader backend
    location /api/ {
        proxy_pass http://sstable-loader:8081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # WebSocket proxy — live metrics stream from sstable-loader
    location /ws {
        proxy_pass http://sstable-loader:8081/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
